apiVersion: v1
kind: Pod
metadata:
  name: backend-pagination-app
spec:
  hostNetwork: true
  containers:
    - name: backend
      image: localhost/backend-pagination-with-jooq:local-jib
      imagePullPolicy: Never
      env:
        - name: JAVA_TOOL_OPTIONS
          value: -XX:MaxRAMPercentage=50.0 -XX:InitialRAMPercentage=50.0 -XX:NativeMemoryTracking=summary
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: health,metrics
        - name: SPRING_PROFILES_ACTIVE
          value: local
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://localhost:5432/books
        - name: SPRING_DATASOURCE_USERNAME
          value: postgres
        - name: SPRING_DATASOURCE_PASSWORD
          value: postgres
      ports:
        - containerPort: 8080
      resources:
        limits:
          memory: 400Mi
        requests:
          cpu: 500m
