spring:
  application:
    name: backend-pagination-with-jooq
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/books}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  liquibase:
    change-log: classpath:db/changelog/master.xml
    # Skip both seed changesets at runtime; opt-in via profile or test override.
    contexts: '!seed-large and !seed-medium'

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
