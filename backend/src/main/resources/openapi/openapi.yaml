openapi: 3.1.1
info:
  title: Book Pagination API
  version: 1.0.0
  summary: Keyset-paginated book browser with single-column sort and toolbar filters.
  description: |
    Single-column sort (server-side) with id tiebreaker. Bidirectional
    pagination via a single opaque `cursor` query parameter. Each response
    body carries `nextCursor` and `prevCursor` strings that the client
    passes back verbatim as `?cursor=...` to fetch the adjacent page.
    Cursor opacity: clients must not parse, decode, or modify the string —
    its internal shape is versioned and may change without notice.
    Switching `sort` or `dir` while reusing a cursor returns 400.

paths:
  /api/books:
    get:
      tags: [books]
      operationId: searchBooks
      summary: Page through books with single-column sort and toolbar filters.
      parameters:
        - name: sort
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/SortField'
        - name: dir
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Direction'
        - name: size
          in: query
          required: true
          description: Page size. Server caps at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          description: |
            Opaque pagination cursor. Pass back the `nextCursor` /
            `prevCursor` returned by the prior response verbatim. Must be
            paired with the same `sort` and `dir` it was issued under —
            mismatches return 400. Omit for the first page.
          schema:
            type: string
        - name: genre
          in: query
          required: false
          description: Match mode `in` — repeat the param for multi-select (`?genre=Fantasy&genre=SciFi`).
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Genre'
        - name: language
          in: query
          required: false
          description: Single-language equality filter. Omit to include all languages.
          schema:
            $ref: '#/components/schemas/Language'
        - name: inStock
          in: query
          required: false
          description: Stock-status filter. Omit to include both states.
          schema:
            type: boolean
        - name: minRating
          in: query
          required: false
          description: Match mode `gte`. 0–5.
          schema:
            type: number
            minimum: 0
            maximum: 5
        - name: priceMin
          in: query
          required: false
          description: Match mode `gte` against `price`.
          schema:
            type: number
            minimum: 0
        - name: priceMax
          in: query
          required: false
          description: Match mode `lte` against `price`.
          schema:
            type: number
            minimum: 0
        - name: publishedAfter
          in: query
          required: false
          description: Match mode `gte` against `publishedAt`.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: A page of books.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookPage'
        '400':
          description: Bad request (invalid params, malformed or mismatched cursor).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  schemas:
    SortField:
      type: string
      enum: [title, author, price, rating, publishedAt]

    Direction:
      type: string
      enum: [asc, desc]

    Genre:
      type: string
      enum: [Fantasy, SciFi, Mystery, Romance, Thriller, NonFiction]

    Language:
      type: string
      enum: [English, German, French, Spanish, Japanese]

    BookDto:
      type: object
      required: [id, title, author, genre, language, inStock, rating, price, publishedAt]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        language:
          $ref: '#/components/schemas/Language'
        inStock:
          type: boolean
        rating:
          type: number
        price:
          type: number
        publishedAt:
          type: string
          format: date

    BookPage:
      type: object
      required: [content]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BookDto'
        nextCursor:
          type: ['string', 'null']
          description: |
            Opaque cursor for the next page, or null if this is the last
            page. Pass back verbatim as `?cursor=...` with the same `sort`
            and `dir` to fetch the next page.
        prevCursor:
          type: ['string', 'null']
          description: |
            Opaque cursor for the previous page, or null if this is the
            first page. Pass back verbatim as `?cursor=...`.

    Problem:
      type: object
      description: RFC 7807 problem details.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
